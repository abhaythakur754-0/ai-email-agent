name: AI Email Agent

on:
  # Run every 30 minutes
  schedule:
    - cron: '*/30 * * * *'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  run-email-agent:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run email agent
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_SMTP: ${{ secrets.EMAIL_SMTP }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_IMAP: ${{ secrets.EMAIL_IMAP }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_URL: ${{ secrets.LLM_API_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          SENDER_NAME: ${{ secrets.SENDER_NAME }}
        run: |
          cd src
          python main.py
      
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "Update data: $(date '+%Y-%m-%d %H:%M')"
          git push
      
      - name: Clean up old data (2-week rotation)
        run: |
          python -c "
          import json
          from datetime import datetime, timedelta
          
          # Clean up emails older than 14 days
          with open('data/emails.json', 'r') as f:
              data = json.load(f)
          
          cutoff = (datetime.now() - timedelta(days=14)).isoformat()
          data['emails'] = [e for e in data.get('emails', []) if e.get('sent_at', '') > cutoff]
          
          with open('data/emails.json', 'w') as f:
              json.dump(data, f, indent=2)
          "
