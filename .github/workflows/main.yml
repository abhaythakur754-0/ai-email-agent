name: AI Email Agent

on:
  # Run every 30 minutes
  schedule:
    - cron: '*/30 * * * *'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  run-email-agent:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run email agent
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_SMTP: ${{ secrets.EMAIL_SMTP }}
          EMAIL_IMAP: ${{ secrets.EMAIL_IMAP }}
          SENDER_NAME: ${{ secrets.SENDER_NAME }}
        run: npm start
      
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "Update data: $(date '+%Y-%m-%d %H:%M')"
          git push
      
      - name: Clean up old data (2-week rotation)
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          
          const emailsFile = path.join('data', 'emails.json');
          const cutoff = new Date(Date.now() - 14 * 24 * 60 * 60 * 1000).toISOString();
          
          try {
            const data = JSON.parse(fs.readFileSync(emailsFile, 'utf8'));
            data.emails = (data.emails || []).filter(e => e.sent_at > cutoff);
            fs.writeFileSync(emailsFile, JSON.stringify(data, null, 2));
          } catch {}
          "
